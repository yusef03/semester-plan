<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusef's Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-panel: #18181b;
            --primary: #f97316; /* HsH Orange */
            --primary-glow: rgba(249, 115, 22, 0.3);
            --danger: #ef4444;
            --success: #22c55e;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- CONFIG PANEL (Einstellungsbereich) --- */
        .config-panel {
            background: rgba(24, 24, 27, 0.95);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px var(--primary-glow);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            position: relative;
        }

        .config-title {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-dark);
            padding: 0 10px;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
        }

        .config-item label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .config-input {
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: monospace;
        }
        
        .config-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* --- DASHBOARD STATS --- */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value { font-size: 2rem; font-weight: 800; display: block; margin-bottom: 5px; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #fbbf24);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* --- SEMESTER GRID --- */
        .semester-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .semester-box {
            background: var(--bg-panel);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .semester-header {
            background: #27272a;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .sem-title { font-weight: bold; }
        .sem-credits { font-size: 0.8rem; color: var(--text-muted); background: #000; padding: 2px 8px; border-radius: 10px; }

        .module-list { padding: 10px; }

        .module-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            border-left: 3px solid transparent;
        }

        .module-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.06); }
        
        .module-item.passed { 
            border-left-color: var(--success); 
            opacity: 0.6; 
        }
        .module-item.passed .module-name { text-decoration: line-through; }
        
        .module-item.failed { 
            border-left-color: var(--danger); 
            background: rgba(239, 68, 68, 0.1);
        }

        .module-item.pending {
            border-left-color: #fbbf24; /* Yellow */
        }

        .module-check {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .module-item.passed .module-check {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }
        .module-item.passed .module-check::after { content: '✓'; font-size: 14px; }

        .module-info { flex: 1; }
        .module-name { display: block; font-weight: 500; font-size: 0.95rem; }
        .module-ects { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .btn-update {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
        }
        .btn-update:hover { background: #ea580c; }

    </style>
</head>
<body>

<div class="container">
    
    <h1 style="text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px;">
        <i class="fa-solid fa-graduation-cap"></i> Mission Control: Bachelor
    </h1>

    <div class="config-panel">
        <span class="config-title"><i class="fa-solid fa-sliders"></i> System Konfiguration</span>
        
        <div class="config-item">
            <label>Aktueller Schnitt (Ø Note)</label>
            <input type="number" id="cfg-gpa" class="config-input" value="3.2" step="0.1">
        </div>

        <div class="config-item">
            <label>Aktuelles Semester</label>
            <input type="number" id="cfg-sem" class="config-input" value="3">
        </div>

        <div class="config-item">
            <label>Ziel-Semester (Plan)</label>
            <input type="number" id="cfg-target" class="config-input" value="8">
        </div>

        <div class="config-item">
            <label>Total Credits (Soll)</label>
            <input type="number" id="cfg-total" class="config-input" value="180">
        </div>
        
        <div class="config-item" style="justify-content: flex-end;">
            <button class="btn-update" onclick="applyConfig()">Werte Aktualisieren</button>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-value" id="display-ects">0 / 180</span>
            <span class="stat-label">ECTS Fortschritt</span>
            <div class="progress-container">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="display-left">156</span>
            <span class="stat-label">ECTS Übrig</span>
        </div>
        <div class="stat-card" style="border-color: var(--primary);">
            <span class="stat-value" id="display-gpa" style="color: var(--primary);">3.2</span>
            <span class="stat-label">Durchschnitt</span>
        </div>
    </div>

    <div class="semester-grid" id="module-grid">
        </div>

</div>

<script>
    /* * --- MASTER KONFIGURATION --- 
     * Hier sind alle Module und Credits definiert.
     * Du kannst die Zahl bei "ects" ändern, wenn du willst.
     */
    
    const DB = [
        {
            sem: 1,
            modules: [
                { id: "s1_prog1", name: "Programmieren 1", ects: 6, status: "pending", note: "3. Versuch!" },
                { id: "s1_gdi", name: "Grundlagen der Informatik", ects: 6, status: "passed" },
                { id: "s1_mathe1", name: "Mathematik 1", ects: 6, status: "pending", note: "Warten" },
                { id: "s1_ti", name: "Theoretische Informatik", ects: 6, status: "pending", note: "Warten" },
                { id: "s1_start", name: "Startprojekt", ects: 4, status: "passed" },
                { id: "s1_eng", name: "Englisch", ects: 2, status: "passed" }
            ]
        },
        {
            sem: 2,
            modules: [
                { id: "s2_prog2", name: "Programmieren 2", ects: 6, status: "failed" },
                { id: "s2_db1", name: "Datenbanksysteme 1", ects: 6, status: "passed" },
                { id: "s2_mathe2", name: "Mathematik 2", ects: 6, status: "passed" },
                { id: "s2_stat", name: "Statistik", ects: 6, status: "failed" },
                { id: "s2_algo", name: "Algorithmen und Datenstrukturen", ects: 6, status: "failed" }
            ]
        },
        {
            sem: 3,
            modules: [
                { id: "s3_prog3", name: "Programmieren 3", ects: 6, status: "open" },
                { id: "s3_db2", name: "Datenbanksysteme 2", ects: 6, status: "open" },
                { id: "s3_mathe3", name: "Mathematik 3", ects: 6, status: "open" },
                { id: "s3_bsn1", name: "Betriebssysteme und Netze 1", ects: 6, status: "failed", note: "Note: 5.0" },
                { id: "s3_proj", name: "Programmierprojekt", ects: 4, status: "pending" },
                { id: "s3_bwl", name: "Betriebswirtschaft", ects: 2, status: "pending" }
            ]
        },
        {
            sem: 4,
            modules: [
                { id: "s4_web", name: "Webtechnologien", ects: 6, status: "open" },
                { id: "s4_se1", name: "Software Engineering 1", ects: 6, status: "open" },
                { id: "s4_cg1", name: "Computergrafik 1", ects: 6, status: "open" },
                { id: "s4_bsn2", name: "Betriebssysteme und Netze 2", ects: 6, status: "open" },
                { id: "s4_sem", name: "Seminar", ects: 4, status: "open" },
                { id: "s4_bwl_erg", name: "Erg. Fach BWL", ects: 2, status: "open" }
            ]
        },
        {
            sem: 5,
            modules: [
                { id: "s5_wpf1", name: "Wahlpflichtfach Informatik 1", ects: 6, status: "open" },
                { id: "s5_se2", name: "Software Engineering 2", ects: 6, status: "open" },
                { id: "s5_cg2", name: "Computergrafik 2", ects: 6, status: "open" },
                { id: "s5_praxis1", name: "Praxisprojekt 1", ects: 10, status: "open", note: "Großes Modul" },
                { id: "s5_erg1", name: "Ergänzendes Fach 1", ects: 2, status: "open" }
            ]
        },
        {
            sem: 6,
            modules: [
                { id: "s6_wpf2", name: "Wahlpflichtfach Informatik 2", ects: 6, status: "open" },
                { id: "s6_praxis2", name: "Praxisprojekt 2", ects: 10, status: "open" },
                { id: "s6_ba", name: "Bachelor-Arbeit mit Kolloquium", ects: 12, status: "open" },
                { id: "s6_erg2", name: "Ergänzendes Fach 2", ects: 2, status: "open" }
            ]
        }
    ];

    // --- LOGIK ---

    function init() {
        renderGrid();
        loadState(); // Lädt gespeicherte Haken
        calculateStats();
    }

    function renderGrid() {
        const grid = document.getElementById('module-grid');
        grid.innerHTML = '';

        DB.forEach(semester => {
            const box = document.createElement('div');
            box.className = 'semester-box';
            
            // Berechne ECTS für dieses Semester
            const semTotal = semester.modules.reduce((acc, m) => acc + m.ects, 0);

            let html = `
                <div class="semester-header">
                    <span class="sem-title">Semester ${semester.sem}</span>
                    <span class="sem-credits">${semTotal} ECTS</span>
                </div>
                <div class="module-list">
            `;

            semester.modules.forEach(mod => {
                let badge = '';
                let extraClass = '';
                
                if (mod.status === 'failed') {
                    badge = `<span class="status-badge" style="color:var(--danger); border:1px solid var(--danger)">5.0</span>`;
                    extraClass = 'failed';
                } else if (mod.status === 'pending') {
                    badge = `<span class="status-badge" style="color:orange; border:1px solid orange">ANGEMELDET</span>`;
                    extraClass = 'pending';
                }

                if (mod.note && mod.status !== 'failed') {
                    badge += `<span class="status-badge" style="color:#aaa; border:1px solid #555">${mod.note}</span>`;
                }

                html += `
                    <div class="module-item ${mod.status === 'passed' ? 'passed' : ''} ${extraClass}" 
                         id="card_${mod.id}" 
                         onclick="toggleModule('${mod.id}', ${mod.ects})">
                        <div class="module-check"></div>
                        <div class="module-info">
                            <span class="module-name">${mod.name} ${badge}</span>
                            <span class="module-ects"><i class="fa-solid fa-coins"></i> ${mod.ects} ECTS</span>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            box.innerHTML = html;
            grid.appendChild(box);
        });
    }

    function toggleModule(id, ects) {
        const card = document.getElementById('card_' + id);
        
        // Toggle Klasse
        if (card.classList.contains('passed')) {
            card.classList.remove('passed');
            localStorage.setItem(id, 'false');
        } else {
            card.classList.add('passed');
            localStorage.setItem(id, 'true');
        }
        
        // Recalculate
        calculateStats();
    }

    function loadState() {
        // Zuerst die "Hardcoded" Passed Sachen aus der DB (sicher ist sicher)
        DB.forEach(sem => {
            sem.modules.forEach(mod => {
                if(mod.status === 'passed') {
                    localStorage.setItem(mod.id, 'true');
                }
            });
        });

        // Jetzt DOM updaten
        const allModules = document.querySelectorAll('.module-item');
        allModules.forEach(item => {
            const id = item.id.replace('card_', '');
            if(localStorage.getItem(id) === 'true') {
                item.classList.add('passed');
            } else {
                item.classList.remove('passed');
            }
        });
    }

    function calculateStats() {
        let currentECTS = 0;
        const totalECTS = parseInt(document.getElementById('cfg-total').value);

        // Zähle alle Module, die die Klasse "passed" haben
        DB.forEach(sem => {
            sem.modules.forEach(mod => {
                const card = document.getElementById('card_' + mod.id);
                if (card && card.classList.contains('passed')) {
                    currentECTS += mod.ects;
                }
            });
        });

        // Update UI
        document.getElementById('display-ects').innerText = `${currentECTS} / ${totalECTS}`;
        document.getElementById('display-left').innerText = totalECTS - currentECTS;
        
        const percent = Math.round((currentECTS / totalECTS) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        
        // Farbe ändern je nach Fortschritt
        if(percent < 30) document.getElementById('progress-bar').style.background = 'var(--danger)';
        else if(percent < 70) document.getElementById('progress-bar').style.background = 'var(--primary)';
        else document.getElementById('progress-bar').style.background = 'var(--success)';
    }

    function applyConfig() {
        // Updated nur die Anzeige des Durchschnitts und Total, falls User oben was ändert
        const gpa = document.getElementById('cfg-gpa').value;
        document.getElementById('display-gpa').innerText = gpa;
        calculateStats(); // Recalculate falls Total geändert wurde
        alert("Konfiguration gespeichert!");
    }

    // Start
    init();

</script>

</body>
</html>
