<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusef's Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-panel: #18181b;
            --primary: #f97316; /* HsH Orange */
            --primary-glow: rgba(249, 115, 22, 0.3);
            --danger: #ef4444;
            --success: #22c55e;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- CONFIG PANEL (Einstellungsbereich) --- */
        .config-panel {
            background: rgba(24, 24, 27, 0.95);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px var(--primary-glow);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            position: relative;
        }

        .config-title {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg-dark);
            padding: 0 10px;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
        }

        .config-item label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .config-input {
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            font-family: monospace;
        }
        
        .config-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* --- DASHBOARD STATS --- */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-panel);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-value { font-size: 2rem; font-weight: 800; display: block; margin-bottom: 5px; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #fbbf24);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* --- HIGH SYSTEM LIVE DASHBOARD --- */
        .live-system-panel {
            background: linear-gradient(145deg, #18181b, #09090b);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.1);
        }
        .live-status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
        }
        .live-dot {
            width: 12px;
            height: 12px;
            background-color: var(--danger);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--danger);
            animation: pulse 2s infinite;
        }
        .live-dot.idle {
            background-color: #555;
            box-shadow: none;
            animation: none;
        }
        .system-clock {
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--text-muted);
        }
        .up-next-container {
            background: rgba(249, 115, 22, 0.1);
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .up-next-kicker { font-size: 0.8rem; color: var(--primary); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .up-next-title { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .up-next-meta { display: flex; gap: 15px; font-size: 0.95rem; color: #ddd; }
        .day-preview-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .day-preview-item {
            display: flex;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 6px;
            align-items: center;
            border-left: 2px solid #333;
        }
        .day-preview-item.active {
            border-left-color: var(--primary);
            background: rgba(249, 115, 22, 0.05);
        }
        .preview-time { width: 120px; color: var(--primary); font-family: monospace; font-size: 0.95rem; }
        .preview-info { flex: 1; display: flex; flex-direction: column; }
        .preview-name { font-weight: bold; font-size: 0.95rem; }
        .preview-room { font-size: 0.8rem; color: var(--text-muted); }
        .preview-empty { color: var(--text-muted); font-style: italic; padding: 10px; text-align: center; }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* --- SECTION TITLES --- */
        .section-title {
            color: var(--primary);
            margin: 40px 0 20px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* --- SCHEDULE SECTION (NEU) --- */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .schedule-semester-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .schedule-sem-title {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 5px;
            font-weight: bold;
        }

        details.schedule-box {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        details.schedule-box:hover {
            border-color: #444;
        }

        details.schedule-box summary {
            padding: 15px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            list-style: none; /* remove default arrow */
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        
        details.schedule-box summary::-webkit-details-marker { display: none; }
        
        details.schedule-box summary::after {
            content: '\f078'; /* FontAwesome chevron-down */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            transition: transform 0.3s;
            color: var(--text-muted);
        }
        
        details.schedule-box[open] summary::after {
            transform: rotate(180deg);
            color: var(--primary);
        }

        .schedule-content {
            padding: 10px;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: rgba(255,255,255,0.04);
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }

        .event-item:last-child {
            margin-bottom: 0;
        }

        .event-type { 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 0.85rem; 
            width: 45px; 
            background: rgba(249, 115, 22, 0.1);
            padding: 3px 6px;
            border-radius: 4px;
            text-align: center;
        }
        
        .event-time { 
            flex: 1; 
            margin-left: 15px; 
            font-size: 0.95rem; 
        }
        
        .event-room { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            text-align: right;
            background: #000;
            padding: 3px 8px;
            border-radius: 10px;
        }

        /* --- SEMESTER GRID (MODULÜBERSICHT) --- */
        .semester-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .semester-box {
            background: var(--bg-panel);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .semester-header {
            background: #27272a;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .sem-title { font-weight: bold; }
        .sem-credits { font-size: 0.8rem; color: var(--text-muted); background: #000; padding: 2px 8px; border-radius: 10px; }

        .module-list { padding: 10px; }

        .module-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s;
            border-left: 3px solid transparent;
        }

        .module-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.06); }
        
        .module-item.passed { 
            border-left-color: var(--success); 
            opacity: 0.6; 
        }
        .module-item.passed .module-name { text-decoration: line-through; }
        
        .module-item.failed { 
            border-left-color: var(--danger); 
            background: rgba(239, 68, 68, 0.1);
        }

        .module-item.pending {
            border-left-color: #fbbf24; /* Yellow */
        }

        .module-check {
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .module-item.passed .module-check {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }
        .module-item.passed .module-check::after { content: '✓'; font-size: 14px; }

        .module-info { flex: 1; }
        .module-name { display: block; font-weight: 500; font-size: 0.95rem; }
        .module-ects { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
            text-transform: uppercase;
        }

        .btn-update {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
        }
        .btn-update:hover { background: #ea580c; }

    </style>
</head>

            <input type="number" id="cfg-total" class="config-input" value="180">
        </div>
        
        <div class="config-item" style="justify-content: flex-end;">
            <button class="btn-update" onclick="applyConfig()">Werte Aktualisieren</button>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-value" id="display-ects">0 / 180</span>
            <span class="stat-label">ECTS Fortschritt</span>

            <div class="up-next-meta" id="up-next-meta">
                </div>
        </div>

            Fahrplan wird berechnet...

        </div>

</div>

                { id: "s5_wpf1", name: "Wahlpflichtfach Informatik 1", ects: 6, status: "open" },

                { id: "s5_erg1", name: "Ergänzendes Fach 1", ects: 2, status: "open" }

    // --- LOGIK ---

function init() {
        renderSchedule(); 
        renderGrid();
        loadState();
        calculateStats();
        
        // NEU: Live System direkt 1x ausführen und dann jede Sekunde (1000ms) updaten
        updateLiveSystem();
        setInterval(updateLiveSystem, 1000);
    }

// NEU: Stundenplan rendern (aktualisiert für das smarte Datenformat)
    function renderSchedule() {
        const container = document.getElementById('schedule-container');
        let html = '';
        
        // Hilfs-Liste, um die Zahlen wieder in Text für die Anzeige umzuwandeln
        const dayNamesShort = ["", "Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"]; 

        SCHEDULE_DB.forEach(sem => {
            html += `<div class="schedule-semester-col">
                        <div class="schedule-sem-title">${sem.semester}</div>`;
            
            sem.modules.forEach(mod => {
                let eventsHtml = '';
                mod.events.forEach(ev => {
                    // Hier basteln wir Tag, Start und Ende wieder zu einem schönen Text zusammen
                    let timeText = `${dayNamesShort[ev.day]} ${ev.start} - ${ev.end}`;
                    
                    eventsHtml += `
                        <div class="event-item">
                            <span class="event-type">${ev.type}</span>
                            <span class="event-time">${timeText}</span>
                            <span class="event-room">${ev.room}</span>
                        </div>
                    `;
                });

                html += `
                    <details class="schedule-box">
                        <summary>${mod.name}</summary>
                        <div class="schedule-content">
                            ${eventsHtml}
                        </div>
                    </details>
                `;
            });
            html += `</div>`;
        });

        container.innerHTML = html;
    }

    function renderGrid() {
        const grid = document.getElementById('module-grid');
        grid.innerHTML = '';

        DB.forEach(semester => {
            const box = document.createElement('div');
            box.className = 'semester-box';
            
            const semTotal = semester.modules.reduce((acc, m) => acc + m.ects, 0);

            let html = `
                <div class="semester-header">
                    <span class="sem-title">Semester ${semester.sem}</span>
                    <span class="sem-credits">${semTotal} ECTS</span>
                </div>
                <div class="module-list">
            `;

            semester.modules.forEach(mod => {
                let badge = '';
                let extraClass = '';
                
                if (mod.status === 'failed') {
                    badge = `<span class="status-badge" style="color:var(--danger); border:1px solid var(--danger)">5.0</span>`;
                    extraClass = 'failed';
                } else if (mod.status === 'pending') {
                    badge = `<span class="status-badge" style="color:orange; border:1px solid orange">ANGEMELDET</span>`;
                    extraClass = 'pending';
                }

                if (mod.note && mod.status !== 'failed') {
                    badge += `<span class="status-badge" style="color:#aaa; border:1px solid #555">${mod.note}</span>`;
                }

                html += `
                    <div class="module-item ${mod.status === 'passed' ? 'passed' : ''} ${extraClass}" 
                         id="card_${mod.id}" 
                         onclick="toggleModule('${mod.id}', ${mod.ects})">
                        <div class="module-check"></div>
                        <div class="module-info">
                            <span class="module-name">${mod.name} ${badge}</span>
                            <span class="module-ects"><i class="fa-solid fa-coins"></i> ${mod.ects} ECTS</span>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            box.innerHTML = html;
            grid.appendChild(box);
        });
    }

    function toggleModule(id, ects) {
        const card = document.getElementById('card_' + id);
        
        if (card.classList.contains('passed')) {
            card.classList.remove('passed');
            localStorage.setItem(id, 'false');
        } else {
            card.classList.add('passed');
            localStorage.setItem(id, 'true');
        }
        
        calculateStats();
    }

function loadState() {
        // --- NEUER TEIL: Werte aus dem Gedächtnis abrufen ---
        const savedGpa = localStorage.getItem('saved_gpa');
        const savedTotal = localStorage.getItem('saved_total');
        const savedSem = localStorage.getItem('saved_sem');
        const savedTarget = localStorage.getItem('saved_target');

        // Wenn ein Wert gespeichert wurde, trage ihn in die Felder und die Anzeige ein
        if (savedGpa) {
            document.getElementById('cfg-gpa').value = savedGpa;
            document.getElementById('display-gpa').innerText = savedGpa;
        }
        if (savedTotal) {
            document.getElementById('cfg-total').value = savedTotal;
        }
        if (savedSem) {
            document.getElementById('cfg-sem').value = savedSem;
        }
        if (savedTarget) {
            document.getElementById('cfg-target').value = savedTarget;
        }
        // ----------------------------------------------------

        // --- ALTER TEIL: Haken für bestandene Module laden ---
        DB.forEach(sem => {
            sem.modules.forEach(mod => {
                if(mod.status === 'passed') {
                    localStorage.setItem(mod.id, 'true');
                }
            });
        });

        const allModules = document.querySelectorAll('.module-item');
        allModules.forEach(item => {
            const id = item.id.replace('card_', '');
            if(localStorage.getItem(id) === 'true') {
                item.classList.add('passed');
            } else {
                item.classList.remove('passed');
            }
        });
    }

    function calculateStats() {
        let currentECTS = 0;
        const totalECTS = parseInt(document.getElementById('cfg-total').value);

        DB.forEach(sem => {
            sem.modules.forEach(mod => {
                const card = document.getElementById('card_' + mod.id);
                if (card && card.classList.contains('passed')) {
                    currentECTS += mod.ects;
                }
            });
        });

        document.getElementById('display-ects').innerText = `${currentECTS} / ${totalECTS}`;
        document.getElementById('display-left').innerText = totalECTS - currentECTS;
        
        const percent = Math.round((currentECTS / totalECTS) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        
        if(percent < 30) document.getElementById('progress-bar').style.background = 'var(--danger)';
        else if(percent < 70) document.getElementById('progress-bar').style.background = 'var(--primary)';
        else document.getElementById('progress-bar').style.background = 'var(--success)';
    }

function applyConfig() {
        // 1. Alle Werte aus deinen Eingabefeldern holen
        const gpa = document.getElementById('cfg-gpa').value;
        const total = document.getElementById('cfg-total').value;
        const sem = document.getElementById('cfg-sem').value;
        const target = document.getElementById('cfg-target').value;

        // 2. NEU: Diese Werte fest im Browser abspeichern
        localStorage.setItem('saved_gpa', gpa);
        localStorage.setItem('saved_total', total);
        localStorage.setItem('saved_sem', sem);
        localStorage.setItem('saved_target', target);

        // 3. Anzeige oben aktualisieren
        document.getElementById('display-gpa').innerText = gpa;
        calculateStats(); 
        alert("Konfiguration fest gespeichert, Bro!");
    }


    // --- HIGH SYSTEM ENGINE: ECHTZEIT-BERECHNUNG ---
    
    // Hilfsfunktion: Wandelt "08:15" in 495 Minuten um (für saubere Mathematik)
    function getMinutes(timeStr) {
        if(!timeStr) return 0;
        const parts = timeStr.split(':');
        return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    }

    function updateLiveSystem() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        // 1. Systemuhr ticken lassen
        document.getElementById('system-clock').innerText = `${hours}:${minutes}:${seconds}`;
        
        const currentMins = now.getHours() * 60 + now.getMinutes();
        let currentDay = now.getDay(); 
        if (currentDay === 0) currentDay = 7; // So=7, Mo=1, Di=2...

        // 2. Alle Termine aus der Datenbank flachklopfen und einlesen
        let allEvents = [];
        SCHEDULE_DB.forEach(sem => {
            sem.modules.forEach(mod => {
                mod.events.forEach(ev => {
                    if(ev.day) {
                        allEvents.push({
                            moduleName: mod.name,
                            type: ev.type,
                            day: ev.day,
                            start: ev.start,
                            end: ev.end,
                            room: ev.room,
                            startMins: getMinutes(ev.start),
                            endMins: getMinutes(ev.end)
                        });
                    }
                });
            });
        });

        // 3. Smart-Filter: Welcher Tag ist relevant?
        let targetDay = currentDay;
        let todaysEvents = allEvents.filter(e => e.day === targetDay);
        
        // Checken: Ist heute schon alles vorbei oder haben wir Wochenende?
        let isTodayDone = todaysEvents.length === 0 || todaysEvents.every(e => e.endMins <= currentMins);
        let isShowingTomorrow = false;

        // Wenn heute durch ist, scannen wir automatisch den nächsten Tag mit Terminen
        if (isTodayDone) {
            targetDay++;
            if(targetDay > 7) targetDay = 1;
            
            for(let i=0; i<7; i++) {
                let checkEvents = allEvents.filter(e => e.day === targetDay);
                if(checkEvents.length > 0) {
                    isShowingTomorrow = true;
                    break;
                }
                targetDay++;
                if(targetDay > 7) targetDay = 1;
            }
        }

        // Termine für den Ziel-Tag chronologisch sortieren
        let displayEvents = allEvents.filter(e => e.day === targetDay).sort((a,b) => a.startMins - b.startMins);
        
        // 4. Status berechnen: Was läuft JETZT? Was kommt ALS NÄCHSTES?
        let activeEvent = null;
        let nextEvent = null;

        if (!isShowingTomorrow) {
            for (let ev of displayEvents) {
                if (ev.startMins <= currentMins && ev.endMins > currentMins) {
                    activeEvent = ev;
                } else if (ev.startMins > currentMins && !nextEvent) {
                    nextEvent = ev;
                }
            }
        } else {
            // Wenn wir schon morgen anzeigen, ist das allererste Event das "nächste"
            nextEvent = displayEvents[0];
        }

        // --- 5. DISPLAY UPDATES (HTML manipulieren) ---
        const dot = document.getElementById('live-indicator-dot');
        const statusText = document.getElementById('live-status-text');
        const upNextBox = document.getElementById('up-next-box');
        const upNextKicker = document.getElementById('up-next-kicker');
        const upNextTitle = document.getElementById('up-next-title');
        const upNextMeta = document.getElementById('up-next-meta');
        const previewHeader = document.getElementById('day-preview-header');
        const previewList = document.getElementById('day-preview-list');

        // Top Status Leiste
        if (activeEvent) {
            dot.classList.remove('idle');
            statusText.innerText = "LIVE: " + activeEvent.moduleName;
        } else {
            dot.classList.add('idle');
            statusText.innerText = "SYSTEM STANDBY";
        }

        // Fokus-Box (Jetzt oder Nächstes)
        upNextBox.style.display = 'block';
        if (activeEvent) {
            upNextKicker.innerText = "JETZT GERADE LÄUFT";
            upNextTitle.innerText = activeEvent.moduleName;
            upNextMeta.innerHTML = `<span><i class="fa-regular fa-clock"></i> ${activeEvent.start} - ${activeEvent.end}</span>
                                    <span><i class="fa-solid fa-location-dot"></i> ${activeEvent.room} <span style="background:var(--primary);color:#000;padding:2px 5px;border-radius:4px;font-size:0.8em;margin-left:5px;">${activeEvent.type}</span></span>`;
        } else if (nextEvent) {
            upNextKicker.innerText = isShowingTomorrow ? "NÄCHSTER VORLESUNGSTAG STARTET MIT" : "ALS NÄCHSTES";
            upNextTitle.innerText = nextEvent.moduleName;
            upNextMeta.innerHTML = `<span><i class="fa-regular fa-clock"></i> ${nextEvent.start} - ${nextEvent.end}</span>
                                    <span><i class="fa-solid fa-location-dot"></i> ${nextEvent.room} <span style="background:var(--primary);color:#000;padding:2px 5px;border-radius:4px;font-size:0.8em;margin-left:5px;">${nextEvent.type}</span></span>`;
        } else {
            upNextBox.style.display = 'none'; 
        }

        // Restliche Liste für den Tag rendern
        const dayNames = ["", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
        if (isShowingTomorrow) {
            previewHeader.innerText = "Fahrplan für " + dayNames[targetDay] + ":";
        } else {
            previewHeader.innerText = "Dein restlicher Tag:";
        }

        previewList.innerHTML = '';
        displayEvents.forEach(ev => {
            let isActive = activeEvent && activeEvent === ev;
            // Nur Events zeigen, die noch nicht vorbei sind (außer wir gucken schon auf morgen, dann alle zeigen)
            if (isShowingTomorrow || ev.endMins > currentMins) {
                previewList.innerHTML += `
                    <div class="day-preview-item ${isActive ? 'active' : ''}">
                        <div class="preview-time">${ev.start} - ${ev.end}</div>
                        <div class="preview-info">
                            <span class="preview-name">${ev.moduleName} <span class="event-type" style="font-size:0.65rem; padding:2px 5px; margin-left:5px;">${ev.type}</span></span>
                            <span class="preview-room">Raum: ${ev.room}</span>
                        </div>
                    </div>
                `;
            }
        });

        if(previewList.innerHTML === '') {
             previewList.innerHTML = '<div class="preview-empty">Alle Vorlesungen für heute sind geschafft! Gönn dir was!</div>';
        }
    }
    init();

</script>
